<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>书法学堂 Pro</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="书法学堂">
    <link rel="apple-touch-icon" href="https://img.icons8.com/clouds/256/000000/chinese-brush.png">

    <script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pinyin-pro@3.13.2/dist/index.js"></script>
    
    <style>
        :root { --ios-blue: #007AFF; --ios-orange: #FF9500; --ios-purple: #AF52DE; --ios-bg: #F2F2F7; }
        body { font-family: -apple-system, "SF Pro Display", "PingFang SC", sans-serif; background: linear-gradient(135deg, #e0eafc, #cfdef3); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        .sidebar { width: 300px; background: rgba(255,255,255,0.45); backdrop-filter: blur(60px) saturate(200%); border-right: 0.5px solid rgba(255,255,255,0.3); display: flex; flex-direction: column; z-index: 10; }
        .sidebar-header { padding: 50px 20px 10px; }
        .sidebar-header h1 { font-size: 26px; font-weight: 900; margin: 0; }
        
        .import-btn { background: var(--ios-purple); color: white; border: none; padding: 12px; border-radius: 16px; margin: 15px; font-weight: 700; cursor: pointer; box-shadow: 0 4px 15px rgba(175, 82, 222, 0.3); }
        
        .word-grid { flex: 1; display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; padding: 15px; overflow-y: auto; min-height: 100px; }
        .word-item { aspect-ratio: 1; background: white; border-radius: 12px; display: flex; justify-content: center; align-items: center; font-size: 18px; font-weight: 700; cursor: pointer; position: relative; box-shadow: 0 4px 10px rgba(0,0,0,0.03); }
        .word-item.active { background: var(--ios-blue); color: white; transform: scale(1.05); z-index: 2; box-shadow: 0 8px 20px rgba(0,122,255,0.3); }
        .word-item.completed::after { content: "⭐"; position: absolute; top: 4px; right: 4px; font-size: 8px; color: var(--ios-orange); }

        .main-stage { flex: 1; display: flex; flex-direction: column; padding: 0 30px; height: 100vh; overflow-y: auto; }
        .header-tools { display: flex; justify-content: space-between; align-items: center; padding: 25px 0 15px; flex-shrink: 0; }
        
        button { padding: 10px 18px; border-radius: 12px; border: none; background: white; font-size: 14px; font-weight: 700; color: var(--ios-blue); cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.05); transition: 0.2s; }
        button.primary { background: var(--ios-blue); color: white; }

        .reference-panel { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(40px); border-radius: 28px; padding: 20px 25px; display: flex; flex-direction: column; gap: 12px; border: 1px solid rgba(255,255,255,0.5); box-shadow: 0 15px 35px rgba(0,0,0,0.05); margin-bottom: 20px; flex-shrink: 0; }
        .panel-top { display: flex; align-items: center; gap: 15px; }
        #static-word-ref { font-size: 80px; font-family: "STKaiti", serif; font-weight: 900; margin: 0; line-height: 1; }
        #stroke-order-steps { display: flex; gap: 8px; overflow-x: auto; flex: 1; }
        .stroke-step-svg { width: 42px; height: 42px; opacity: 0.6; flex-shrink: 0; }

        .info-display-area { border-top: 1px solid rgba(0,0,0,0.05); display: none; padding-top: 12px; }
        #pinyin-box { font-size: 38px; font-weight: 900; color: var(--ios-blue); margin-bottom: 5px; }
        #sentence-box { font-size: 22px; color: #1c1c1e; line-height: 1.4; font-weight: 500; }
        .keyword-underline { text-decoration: underline; text-decoration-color: var(--ios-orange); text-decoration-thickness: 3px; text-underline-offset: 6px; }

        .practice-rows { display: flex; flex-direction: column; gap: 20px; padding-bottom: 30px; }
        .grid-container { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; width: 100%; }
        .char-card { background: white; border-radius: 30px; position: relative; width: 180px; height: 180px; margin: 0 auto; display: flex; justify-content: center; align-items: center; box-shadow: 0 8px 20px rgba(0,0,0,0.04); border: 1px solid white; }
        .char-card::before { content: ""; position: absolute; inset: 0; pointer-events: none; border-radius: 30px; background-image: linear-gradient(to bottom, transparent 49.8%, rgba(255,77,79,0.05) 50%, transparent 50.2%), linear-gradient(to right, transparent 49.8%, rgba(255,77,79,0.05) 50%, transparent 50.2%); }

        .quiz-overlay { display: none; position: fixed; inset: 0; background: rgba(242, 242, 247, 0.9); backdrop-filter: blur(30px); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(20px); display: none; justify-content: center; align-items: center; z-index: 2000; }
        .pop-card { background: white; padding: 30px; border-radius: 30px; width: 350px; text-align: center; }
        textarea { width: 100%; height: 120px; border-radius: 12px; padding: 10px; border: 1px solid #eee; margin: 10px 0; font-size: 16px; box-sizing: border-box; }
        .word-grid::-webkit-scrollbar { display: none; }
    </style>
</head>
<body onclick="initAudioContext()">

    <aside class="sidebar">
        <div class="sidebar-header">
            <h1>书法学堂</h1>
            <select id="gradeSelect" onchange="loadStaticLibrary()" style="width:100%; padding:10px; border-radius:10px; border:none; background:rgba(0,0,0,0.08); font-weight:700; margin-top:10px;">
                <option value="1">一年级</option><option value="2">二年级</option>
                <option value="3">三年级</option><option value="4">四年级</option>
                <option value="custom">神奇口袋</option>
            </select>
        </div>
        <button class="import-btn" onclick="openImport()">＋ 手动加字</button>
        <div class="word-grid" id="wordGrid"></div>
    </aside>

    <main class="main-stage">
        <div class="header-tools">
            <div id="statusMsg" style="font-weight:800; color:#555;">准备就绪</div>
            <div style="display:flex; gap:10px;">
                <button onclick="initQuizChallenge()" style="background:var(--ios-orange); color:white;">🏆 听写</button>
                <button onclick="playDemo()">📺 演示</button>
                <button class="primary" onclick="recommendNext()">🎁 下一个</button>
            </div>
        </div>
        <div class="reference-panel">
            <div class="panel-top">
                <p id="static-word-ref">一</p>
                <div id="stroke-order-steps"></div>
                <div style="display:flex; gap:8px;">
                    <button onclick="handlePinyin()">拼音</button>
                    <button class="primary" onclick="handleGeminiSentence()" style="background:var(--ios-purple);">AI造句</button>
                </div>
            </div>
            <div class="info-display-area" id="infoArea">
                <div id="pinyin-box" style="display:none;"></div>
                <div id="sentence-box" style="display:none;"></div>
            </div>
        </div>
        <div class="practice-rows" id="practiceArea"></div>
    </main>

    <div class="quiz-overlay" id="quizOverlay">
        <h1>听写挑战</h1>
        <div id="quiz-box-main" style="width:320px; height:320px; background:white; border-radius:40px; display:flex; justify-content:center; align-items:center;"></div>
        <button class="primary" style="margin-top:40px; padding:15px 40px;" onclick="exitQuiz()">退出</button>
    </div>

    <div class="modal-overlay" id="importModal">
        <div class="pop-card"><h2>神奇口袋</h2><textarea id="importArea"></textarea><div style="display:flex; gap:10px;"><button style="flex:1;" onclick="closeImport()">取消</button><button class="primary" style="flex:1;" onclick="processImport()">确定</button></div></div>
    </div>

    <div class="modal-overlay" id="winModal">
        <div class="pop-card"><span style="font-size:50px;">🌟</span><h2 id="winTitle">太棒了！</h2><button class="primary" style="width:100%; padding:12px; border-radius:15px;" onclick="closeWin()">下一个</button></div>
    </div>

<script>
    // 强制立即声明变量
    const GEMINI_API_KEY = "AIzaSyBzGlm2g223Vc6LVCdsf4fSVBE8T6eyznE"; 
    const STATIC_WORDS = {
        "1": "一二三四五六七八九十大小多少上下左右前后口手心头目耳牙舌足日月风雨雷电金木土天人老师同学谢谢开学读书写字问好朋友",
        "2": "学校课室桌椅黑板粉笔铅笔书包颜色红黄蓝绿黑白花草树木操场活动游戏帮忙眼睛鼻子嘴巴耳朵肩膀头发手指脚趾",
        "3": "希望健康舒服精神晨晚安静运动呼吸锻炼保护环境整洁漂亮简单容易困难办法解决成功失败努力坚持勇敢进步害怕担心伤心生气照顾",
        "4": "繁荣尊敬勇敢愿望庆祝环境满意渴喝赞美克服困难鼓励胜利珍惜时间生命安全规则服务社会建设祖国团结友爱和平发展科技发明创新",
        "custom": localStorage.getItem('hanzi_custom_final') || ""
    };

    let currentWord = "";
    let learnedWords = JSON.parse(localStorage.getItem('hanzi_learned_final') || '[]');
    let audioCtx = null;
    let writerDemo;

    function initAudioContext() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }

    function playWinSound() {
        if (!audioCtx) return;
        [523, 659, 783, 1046].forEach((f, i) => {
            const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
            o.type = 'sine'; o.frequency.setValueAtTime(f, audioCtx.currentTime + i*0.1);
            g.gain.setValueAtTime(0.1, audioCtx.currentTime + i*0.1);
            g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + i*0.1 + 0.4);
            o.connect(g); g.connect(audioCtx.destination);
            o.start(audioCtx.currentTime + i*0.1); o.stop(audioCtx.currentTime + i*0.1 + 0.5);
        });
    }

    // 核心修复：确保渲染函数健壮
    function loadStaticLibrary() {
        const g = document.getElementById('gradeSelect').value;
        const raw = STATIC_WORDS[g] || "";
        const lib = raw.split('');
        const grid = document.getElementById('wordGrid');
        
        grid.innerHTML = '';
        if (lib.length === 0 && g === "custom") {
            grid.innerHTML = '<div style="grid-column:span 4; font-size:12px; color:#888; text-align:center; padding-top:20px;">口袋是空的，点击“手动加字”试试吧！</div>';
            return;
        }

        lib.forEach(char => {
            const el = document.createElement('div');
            el.className = `word-item ${learnedWords.includes(char) ? 'completed' : ''} ${char === currentWord ? 'active' : ''}`;
            el.innerText = char;
            el.onclick = () => loadChar(char);
            grid.appendChild(el);
        });
        
        // 自动加载第一个字
        if (lib.length > 0 && (!currentWord || !lib.includes(currentWord))) {
            loadChar(lib[0]);
        }
    }

    async function loadChar(char) {
        currentWord = char;
        document.getElementById('infoArea').style.display = 'none';
        document.getElementById('static-word-ref').innerText = char;
        
        // 刷新侧边栏选中状态
        document.querySelectorAll('.word-item').forEach(el => {
            el.classList.toggle('active', el.innerText === char);
        });

        document.getElementById('practiceArea').innerHTML = `
            <div class="grid-container"><div class="char-card" id="demo-box"></div><div class="char-card" id="trace-1"></div><div class="char-card" id="trace-2"></div><div class="char-card" id="trace-3"></div></div>
            <div class="grid-container"><div class="char-card" id="blank-1"></div><div class="char-card" id="blank-2"></div><div class="char-card" id="blank-3"></div><div class="char-card" id="blank-4"></div></div>
        `;

        const config = { width: 180, height: 180, padding: 20, strokeColor: '#1C1C1E' };
        writerDemo = HanziWriter.create('demo-box', char, config);
        const charData = await HanziWriter.loadCharacterData(char);
        const orderSteps = document.getElementById('stroke-order-steps'); orderSteps.innerHTML = '';
        charData.strokes.slice(0, 10).forEach((s, i) => {
            const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
            svg.setAttribute('class', 'stroke-step-svg'); svg.setAttribute('viewBox', '0 0 1024 1024');
            const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
            g.setAttribute('transform', 'scale(1, -1) translate(0, -900)');
            svg.appendChild(g);
            for (let j = 0; j <= i; j++) {
                const p = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                p.setAttribute('d', charData.strokes[j]); p.setAttribute('fill', j===i ? '#007AFF' : '#EEE');
                g.appendChild(p);
            }
            orderSteps.appendChild(svg);
        });

        ['trace-1','trace-2','trace-3'].forEach(id => HanziWriter.create(id, char, { ...config, showCharacter: false, strokeColor: '#007AFF' }).quiz());
        let count = 0;
        ['blank-1','blank-2','blank-3','blank-4'].forEach(id => {
            HanziWriter.create(id, char, { ...config, showCharacter: false, showOutline: false }).quiz({
                onComplete: () => { count++; if(count === 4) { if(!learnedWords.includes(char)) { learnedWords.push(char); localStorage.setItem('hanzi_learned_final', JSON.stringify(learnedWords)); } showWin(); } }
            });
        });
    }

    // AI, Pinyin, Quiz 等函数保持 v6.5 逻辑，仅在完成时调用 loadStaticLibrary() 刷新视图
    async function handleGeminiSentence() {
        document.getElementById('infoArea').style.display = 'block';
        const box = document.getElementById('sentence-box');
        box.style.display = 'block'; box.innerHTML = `思考中...`;
        try {
            const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key=${GEMINI_API_KEY}`, { method: "POST", headers: {"Content-Type":"application/json"}, body: JSON.stringify({ contents: [{ parts: [{ text: `你是小学老师。用“${currentWord}”造一个10字内短句。只回句子。` }] }] }) });
            const data = await resp.json();
            const s = data.candidates[0].content.parts[0].text.trim();
            box.innerText = s; speakTeacher(s);
        } catch(e) { box.innerText = "Gemini 休息中。"; }
    }

    function handlePinyin() {
        document.getElementById('infoArea').style.display = 'block';
        const py = pinyinPro.pinyin(currentWord, { toneType: 'symbol' });
        const box = document.getElementById('pinyin-box');
        box.innerText = py; box.style.display = 'block';
        speakTeacher(currentWord, true);
    }

    function speakTeacher(txt, isPy=false) { window.speechSynthesis.cancel(); const u = new SpeechSynthesisUtterance(txt); u.lang='zh-CN'; u.rate=isPy?0.6:0.8; window.speechSynthesis.speak(u); }
    function openImport() { document.getElementById('importModal').style.display = 'flex'; }
    function closeImport() { document.getElementById('importModal').style.display = 'none'; }
    function processImport() {
        const t = document.getElementById('importArea').value;
        const c = t.match(/[\u4e00-\u9fa5]/g);
        if(c) {
            const uni = [...new Set(c)].join('');
            localStorage.setItem('hanzi_custom_final', uni);
            STATIC_WORDS.custom = uni;
            document.getElementById('gradeSelect').value = "custom";
            loadStaticLibrary();
        }
        closeImport();
    }
    function showWin() { playWinSound(); confetti({ particleCount: 150 }); document.getElementById('winModal').style.display = 'flex'; loadStaticLibrary(); }
    function closeWin() { document.getElementById('winModal').style.display = 'none'; recommendNext(); }
    function recommendNext() { const g=document.getElementById('gradeSelect').value; const l=STATIC_WORDS[g].split(''); const n=l.find(c=>!learnedWords.includes(c)); loadChar(n||l[0]); }
    function playDemo() { writerDemo.animateCharacter(); }
    function exitQuiz() { document.getElementById('quizOverlay').style.display = 'none'; }
    function initQuizChallenge() { if(learnedWords.length<3){alert("多练几个！");return;} document.getElementById('quizOverlay').style.display='flex'; loadQuizStep(); }
    function loadQuizStep() {
        const t = learnedWords[Math.floor(Math.random()*learnedWords.length)];
        const box = document.getElementById('quiz-box-main'); box.innerHTML = '';
        HanziWriter.create('quiz-box-main', t, { width: 300, height: 300, padding: 30, showOutline: false, showCharacter: false }).quiz({ onComplete: () => { playWinSound(); confetti(); setTimeout(exitQuiz, 1500); } });
        speakTeacher(`请写出：${t}`, false);
    }

    // 终极修复方案：多重保险确保初始化成功
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', loadStaticLibrary);
    } else {
        loadStaticLibrary();
    }

    // PWA 注册
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => { navigator.serviceWorker.register('./sw.js').catch(()=>{}); });
    }
</script>
</body>
</html>
